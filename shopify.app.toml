# Shopify App configuration — used by Shopify CLI (`shopify app deploy`, etc.)
# Docs: https://shopify.dev/docs/apps/tools/cli/configuration

client_id = ""  # Set after creating app in Partner Dashboard

name = "Omniweb AI"
application_url = "https://omniweb-engine-rs6fr.ondigitalocean.app"
handle = "omniweb-ai"

[access_scopes]
scopes = "read_products,read_discounts,write_discounts,read_orders,read_customers,read_themes,write_script_tags"

[auth]
redirect_urls = [
  "https://omniweb-engine-rs6fr.ondigitalocean.app/api/shopify/oauth/callback",
]

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/api/shopify/webhooks/app-uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/api/shopify/webhooks/app-subscriptions-update"

  [[webhooks.subscriptions]]
  topics = [ "customers/data_request" ]
  uri = "/api/shopify/webhooks/customers-data-request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  topics = [ "customers/redact" ]
  uri = "/api/shopify/webhooks/customers-redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "shop/redact" ]
  uri = "/api/shopify/webhooks/shop-redact"
  compliance_topics = [ "shop/redact" ]

[app_proxy]
url = "https://omniweb-engine-rs6fr.ondigitalocean.app/api/shopify/public"
subpath = "omniweb"
prefix = "apps"

[pos]
embedded = false
