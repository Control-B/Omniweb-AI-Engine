services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: omniweb_engine
      POSTGRES_USER: omniweb
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Use 5433 on the host so local macOS Postgres on 5432 does not shadow Docker.
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniweb -d omniweb_engine"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── FastAPI (API + webhooks) ────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://omniweb:password@postgres:5432/omniweb_engine
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js Dashboard (admin + demo + widget UI) ───────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_ENGINE_URL: ${NEXT_PUBLIC_ENGINE_URL:-http://localhost:8000}
        NEXT_PUBLIC_PLATFORM_URL: ${NEXT_PUBLIC_PLATFORM_URL:-http://localhost:3000}
        CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_ENGINE_URL: ${NEXT_PUBLIC_ENGINE_URL:-http://localhost:8000}
      NEXT_PUBLIC_PLATFORM_URL: ${NEXT_PUBLIC_PLATFORM_URL:-http://localhost:3000}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Shopify Remix App (embedded merchant app) ──────────────────────────────
  shopify-app:
    build:
      context: .
      dockerfile: frontend/shopify-app/Dockerfile
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY:-}
      SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET:-}
      SHOPIFY_APP_URL: ${SHOPIFY_APP_URL:-http://localhost:3001}
      SHOPIFY_API_VERSION: ${SHOPIFY_API_VERSION:-2026-07}
      SHOPIFY_SCOPES: ${SHOPIFY_SCOPES:-read_customers,read_orders,read_products,read_themes,unauthenticated_read_product_listings}
      DATABASE_URL: postgresql://omniweb:password@postgres:5432/omniweb_engine
      SESSION_SECRET: ${SESSION_SECRET:-change-me-at-least-32-characters}
      OMNIWEB_ENGINE_URL: http://api:8000
      OMNIWEB_ENGINE_SHARED_SECRET: ${OMNIWEB_ENGINE_SHARED_SECRET:-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── LiveKit Agent Worker (self-hosted voice agent) ──────────────────────────
  agent-worker:
    build:
      context: .
      target: agent-worker
    env_file: .env
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
    restart: unless-stopped

  # ── Shopify Service (isolated container) ───────────────────────────────────
  shopify:
    build:
      context: .
      target: shopify
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://omniweb:password@postgres:5432/omniweb_engine
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
