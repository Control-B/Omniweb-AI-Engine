name: omniweb-engine
region: nyc

domains:
  - domain: omniweb.ai
    type: PRIMARY
    minimum_tls_version: "1.2"
  - domain: api.omniweb.ai
    type: ALIAS
    minimum_tls_version: "1.2"

databases:
  - engine: PG
    name: db
    num_nodes: 1
    size: db-s-dev-database
    version: "16"

services:
  - name: api
    github:
      repo: Control-B/Omniweb-AI-Engine
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 15
    envs:
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: ${db.DATABASE_URL}
      - key: ENVIRONMENT
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: 06e062e7a8067a0ded6ad592c2fef58e6527c043a77dbdc37f51607cb8ecb004
      - key: INTERNAL_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: 413f756ad22ce04044c85d4a9dfee88de0b1d7d8d7f44abb435d62c978415fa1
      - key: ELEVENLABS_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: 177219d04f212c1c5e6919248935a63b68318de54d939b86b9502e83e163da43
      - key: ELEVENLABS_DEFAULT_VOICE_ID
        scope: RUN_AND_BUILD_TIME
        value: EXAVITQu4vr4xnSDxMaL
      - key: ELEVENLABS_WEBHOOK_SECRET
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: TWILIO_ACCOUNT_SID
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: TWILIO_AUTH_TOKEN
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: TWILIO_FROM_NUMBER
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: OPENAI_API_KEY
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: OPENAI_MODEL
        scope: RUN_AND_BUILD_TIME
        value: gpt-4o
      - key: STRIPE_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: REDIS_URL
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: CORS_ORIGINS
        scope: RUN_AND_BUILD_TIME
        value: '["https://omniweb.ai","https://www.omniweb.ai","https://roadcall.ai","https://www.roadcall.ai"]'

  - name: dashboard
    github:
      repo: Control-B/Omniweb-AI-Engine
      branch: main
      deploy_on_push: true
    dockerfile_path: dashboard/Dockerfile
    source_dir: /
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: BUILD_TIME
        value: "https://api.omniweb.ai"

ingress:
  rules:
    - match:
        authority:
          exact: omniweb-engine-rs6fr.ondigitalocean.app
        path:
          prefix: /api
      redirect:
        authority: api.omniweb.ai
        scheme: https
        redirect_code: 307
    - match:
        authority:
          exact: omniweb-engine-rs6fr.ondigitalocean.app
        path:
          exact: /health
      redirect:
        authority: api.omniweb.ai
        scheme: https
        redirect_code: 307
    - match:
        authority:
          exact: omniweb-engine-rs6fr.ondigitalocean.app
        path:
          prefix: /
      redirect:
        authority: omniweb.ai
        scheme: https
        uri: /admin
        redirect_code: 302
    - component:
        name: api
        preserve_path_prefix: true
      match:
        path:
          prefix: /api
    - component:
        name: api
        preserve_path_prefix: true
      match:
        path:
          prefix: /health
    - component:
        name: dashboard
      match:
        path:
          prefix: /
